<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>IC Portfolio</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM (production) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel (for in-browser JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>

  <body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      /* -------------------------
         Helpers: build GitHub links from current Pages URL
      --------------------------*/
      const getGitHubTreeBase = () => {
        // Pages URL pattern: https://<user>.github.io/<repo>/
        // Example: https://23sakuracyj.github.io/ic-projects-portfolio-/
        const host = window.location.host; // "23sakuracyj.github.io"
        const user = host.split(".")[0]; // "23sakuracyj"
        const parts = window.location.pathname.split("/").filter(Boolean);
        const repo = parts[0] || ""; // "ic-projects-portfolio-"
        const branch = "main";

        // Build: https://github.com/<user>/<repo>/tree/main/
        return `https://github.com/${user}/${repo}/tree/${branch}/`;
      };

      // Safe folder encoder: preserves your exact folder string, but URL-encodes it
      const folderLink = (folderName) => {
        const base = getGitHubTreeBase();
        return base + encodeURIComponent(folderName);
      };

      /* -------------------------
         ProjectCard Component
      --------------------------*/
      const ProjectCard = ({
        number,
        title,
        subtitle,
        metrics,
        tags,
        status,
        statusColor,
        delay,
        link,
      }) => {
        const [isVisible, setIsVisible] = useState(false);

        useEffect(() => {
          const timer = setTimeout(() => setIsVisible(true), delay);
          return () => clearTimeout(timer);
        }, [delay]);

        return (
          <div
            className={`bg-white rounded-xl border border-gray-200 overflow-hidden hover:shadow-lg hover:-translate-y-1 transition-all duration-300 ${
              isVisible ? "opacity-100 translate-y-0 scale-100" : "opacity-0 translate-y-8 scale-95"
            }`}
            style={{
              transition: "opacity 0.5s ease-out, transform 0.5s ease-out, box-shadow 0.3s ease",
            }}
          >
            <div className="p-5 pb-4">
              <p className="text-xs text-gray-400 font-medium tracking-wider mb-1">
                PROJECT {number.toString().padStart(2, "0")}
              </p>
              <h3 className="text-lg font-bold text-gray-900 leading-tight">{title}</h3>
              <p className="text-sm text-gray-500 mt-1">{subtitle}</p>
            </div>

            <div className="bg-gray-50 px-5 py-4 grid grid-cols-3 gap-2 border-y border-gray-100">
              {metrics.map((metric, i) => (
                <div key={i} className="text-center">
                  <div className="text-lg font-bold text-gray-800">{metric.value}</div>
                  <div className="text-xs text-gray-400 uppercase tracking-wide">{metric.label}</div>
                </div>
              ))}
            </div>

            <div className="px-5 py-3 flex flex-wrap gap-1.5">
              {tags.map((tag, i) => (
                <span
                  key={i}
                  className="px-2.5 py-1 bg-gray-100 text-gray-600 rounded text-xs font-medium"
                >
                  {tag}
                </span>
              ))}
            </div>

            <div className="px-5 py-3 flex items-center justify-between border-t border-gray-100">
              <span className={`text-sm font-medium flex items-center gap-1.5 ${statusColor}`}>
                {status === "In Progress" ? (
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 20 20">
                    <circle cx="10" cy="10" r="7" />
                  </svg>
                ) : (
                  <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path
                      fillRule="evenodd"
                      d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                      clipRule="evenodd"
                    />
                  </svg>
                )}
                {status}
              </span>

              <a
                href={link}
                target="_blank"
                rel="noopener noreferrer"
                className="px-4 py-1.5 bg-gray-800 text-white text-xs font-medium rounded hover:bg-gray-700 transition-colors"
              >
                VIEW DETAILS →
              </a>
            </div>
          </div>
        );
      };

      /* -------------------------
         Main Portfolio Component
      --------------------------*/
      const Portfolio = () => {
        const [headerVisible, setHeaderVisible] = useState(false);
        const [skillsVisible, setSkillsVisible] = useState(false);

        useEffect(() => {
          setHeaderVisible(true);
          const timer = setTimeout(() => setSkillsVisible(true), 800);
          return () => clearTimeout(timer);
        }, []);

        // IMPORTANT: folder names must exactly match your repo folders (including spaces and dash type)
        const projects = [
          {
            number: 1,
            title: "16×16 6T SRAM Compute-in-Memory",
            subtitle: "Low-voltage CIM with conditional write-back, WFSC, and synchronous write-assist",
            metrics: [
              { value: "16×16", label: "ARRAY" },
              { value: "≤10 mW", label: "WRITE PWR" },
              { value: "<10 MHz", label: "FREQ" },
            ],
            tags: [
              "6T SRAM",
              "CIM",
              "Conditional Write-Back",
              "WFSC",
              "Neg. Bitline Assist",
              "SA + Compare Array",
              "TSMC 180nm",
              "HSPICE/Spectre",
            ],
            status: "In Progress",
            statusColor: "text-amber-600",
            delay: 200,
            link: folderLink("6T SRAM CIM Array"),
          },
          {
            number: 2,
            title: "8-bit Brent–Kung Prefix Adder",
            subtitle: "Full-custom CMOS with pre-/post-layout verification and RCA comparison",
            metrics: [
              { value: "8-bit", label: "WIDTH" },
              { value: "BK", label: "ARCH" },
              { value: "DRC/LVS", label: "SIGN-OFF" },
            ],
            tags: [
              "Prefix Adder",
              "RCA Baseline",
              "Virtuoso",
              "Calibre DRC/LVS",
              "Post-Layout Sim",
              "HSPICE",
              "DFF Outputs",
            ],
            status: "Design Complete",
            statusColor: "text-green-600",
            delay: 350,
            link: folderLink("8-bit Brent–Kung Prefix Adder"),
          },
          {
            number: 3,
            title: "Two-Stage CMOS Operational Amplifier",
            subtitle: "Device matching + custom layout with stability and robustness verification",
            metrics: [
              { value: "2-stage", label: "TOPOLOGY" },
              { value: "Matching", label: "LAYOUT" },
              { value: "DRC/LVS", label: "CHECKS" },
            ],
            tags: [
              "Miller Compensation",
              "Biasing",
              "CMRR/PSRR",
              "AC/DC/Tran",
              "Virtuoso",
              "Calibre DRC/LVS",
              "HSPICE/Spectre",
            ],
            status: "Design Complete",
            statusColor: "text-green-600",
            delay: 500,
            link: folderLink("Two-Stage CMOS Operational Amplifier"),
          },
          {
            number: 4,
            title: "AXI-Lite SPI Virtual EEPROM Controller",
            subtitle: "Pure-Verilog SPI master + 4 KB EEPROM slave with PS–PL co-verification",
            metrics: [
              { value: "4 KB", label: "EEPROM" },
              { value: "AXI-Lite", label: "BUS" },
              { value: "Mode 0", label: "SPI" },
            ],
            tags: [
              "Frame Control",
              "TX/RX FIFO",
              "Addr Auto-Inc",
              "Virtual EEPROM",
              "Register Divider",
              "Verilog TB",
              "On-board Test",
              "PS–PL Co-Verify",
            ],
            status: "Verified on Board",
            statusColor: "text-green-600",
            delay: 650,
            link: folderLink("AXI-Lite SPI Virtual EEPROM Controller"),
          },
        ];

        const skills = [
          "Verilog",
          "Verilog-A",
          "SPICE (HSPICE/Spectre)",
          "Cadence Virtuoso",
          "Calibre (DRC/LVS)",
          "Transistor-level Simulation",
          "Low-Voltage SRAM/CIM",
          "Analog Layout Matching",
          "AXI-Lite / SPI",
          "Git",
        ];

        return (
          <div className="min-h-screen bg-gray-50 p-8">
            <div className="max-w-5xl mx-auto">
              <div
                className={`text-center mb-10 transition-all duration-700 ${
                  headerVisible ? "opacity-100 translate-y-0" : "opacity-0 -translate-y-4"
                }`}
              >
                <div className="w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold shadow-lg mx-auto mb-4">
                  YC
                </div>
                <h1 className="text-3xl font-bold text-gray-900">Yijie Chen</h1>
                <p className="text-gray-500 mt-2">B.S. Electrical Engineering · IC Design Track</p>
                <p className="text-gray-400 text-sm mt-3 max-w-2xl mx-auto">
                  Focused on IC design across memory/CIM, full-custom digital, and analog circuits, with schematic-to-layout
                  verification and transistor-level simulation.
                </p>
              </div>

              <div className="flex items-center justify-between mb-4">
                <h2
                  className={`text-sm font-semibold text-gray-400 uppercase tracking-wider transition-all duration-500 ${
                    headerVisible ? "opacity-100" : "opacity-0"
                  }`}
                >
                  Independent Projects
                </h2>
                <div className="text-xs text-gray-400">Ordered for IC applications (Memory → Digital → Analog → Interface)</div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-10">
                {projects.map((project, index) => (
                  <ProjectCard key={index} {...project} />
                ))}
              </div>

              <h2
                className={`text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4 transition-all duration-500 ${
                  skillsVisible ? "opacity-100" : "opacity-0"
                }`}
              >
                Technical Skills
              </h2>

              <div
                className={`bg-white rounded-xl border border-gray-200 p-5 transition-all duration-500 ${
                  skillsVisible ? "opacity-100 translate-y-0" : "opacity-0 translate-y-4"
                }`}
              >
                <div className="flex flex-wrap gap-2">
                  {skills.map((skill, i) => (
                    <span
                      key={i}
                      className="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-200 transition-colors cursor-default"
                    >
                      {skill}
                    </span>
                  ))}
                </div>
              </div>

              <div
                className={`text-center text-xs text-gray-400 mt-8 transition-opacity duration-500 ${
                  skillsVisible ? "opacity-100" : "opacity-0"
                }`}
              >
                Clean UI with staggered load animation · Tailwind + React (CDN)
              </div>
            </div>
          </div>
        );
      };

      /* --- Render to DOM --- */
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<Portfolio />);
    </script>
  </body>
</html>
