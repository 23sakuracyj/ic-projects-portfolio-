<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>IC Portfolio</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>

  <body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">

      const { useState, useEffect } = React;

      /* -------------------------
         ProjectCard Component
      --------------------------*/
      const ProjectCard = ({ number, title, subtitle, metrics, tags, status, statusColor, delay }) => {
        const [isVisible, setIsVisible] = useState(false);
        
        useEffect(() => {
          const timer = setTimeout(() => setIsVisible(true), delay);
          return () => clearTimeout(timer);
        }, [delay]);

        return (
          <div 
            className={`bg-white rounded-xl border border-gray-200 overflow-hidden hover:shadow-lg hover:-translate-y-1 transition-all duration-300 ${
              isVisible 
                ? 'opacity-100 translate-y-0 scale-100' 
                : 'opacity-0 translate-y-8 scale-95'
            }`}
            style={{ 
              transition: 'opacity 0.5s ease-out, transform 0.5s ease-out, box-shadow 0.3s ease',
            }}
          >
            <div className="p-5 pb-4">
              <p className="text-xs text-gray-400 font-medium tracking-wider mb-1">
                PROJECT {number.toString().padStart(2, '0')}
              </p>
              <h3 className="text-lg font-bold text-gray-900 leading-tight">{title}</h3>
              <p className="text-sm text-gray-500 mt-1">{subtitle}</p>
            </div>
            
            <div className="bg-gray-50 px-5 py-4 grid grid-cols-3 gap-2 border-y border-gray-100">
              {metrics.map((metric, i) => (
                <div key={i} className="text-center">
                  <div className="text-lg font-bold text-gray-800">{metric.value}</div>
                  <div className="text-xs text-gray-400 uppercase tracking-wide">{metric.label}</div>
                </div>
              ))}
            </div>
            
            <div className="px-5 py-3 flex flex-wrap gap-1.5">
              {tags.map((tag, i) => (
                <span key={i} className="px-2.5 py-1 bg-gray-100 text-gray-600 rounded text-xs font-medium">
                  {tag}
                </span>
              ))}
            </div>
            
            <div className="px-5 py-3 flex items-center justify-between border-t border-gray-100">
              <span className={`text-sm font-medium flex items-center gap-1.5 ${statusColor}`}>
                {status === "In Progress" ? (
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 20 20">
                    <circle cx="10" cy="10" r="7" />
                  </svg>
                ) : (
                  <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path
                      fillRule="evenodd"
                      d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                      clipRule="evenodd"
                    />
                  </svg>
                )}
                {status}
              </span>
              <button className="px-4 py-1.5 bg-gray-800 text-white text-xs font-medium rounded hover:bg-gray-700 transition-colors">
                VIEW DETAILS →
              </button>
            </div>
          </div>
        );
      };

      /* -------------------------
         Main Profile Component
      --------------------------*/
      const GitHubProfilePreview = () => {
        const [headerVisible, setHeaderVisible] = useState(false);
        const [skillsVisible, setSkillsVisible] = useState(false);

        useEffect(() => {
          setHeaderVisible(true);
          const timer = setTimeout(() => setSkillsVisible(true), 800);
          return () => clearTimeout(timer);
        }, []);

        const projects = [
          {
            number: 1,
            title: "6T SRAM CIM Array",
            subtitle: "16×16 Compute-in-Memory Array with Adaptive Write Assist",
            metrics: [
              { value: "16×16", label: "Array Size" },
              { value: "<20 mW", label: "Dyn Power" },
              { value: ">10 MHz", label: "Freq" }
            ],
            tags: [
              "6T SRAM", "CIM", "HSPICE", "SNM Butterfly",
              "Write-Assist", "Smart Write Skip", "Shadow Register",
              "Decoder / WL / BL"
            ],
            status: "In Progress",
            statusColor: "text-amber-600",
            delay: 200
          },
          {
            number: 2,
            title: "Multi-Protocol Async Bridge",
            subtitle: "UART Bridge with Async FIFO and PLL Clocking",
            metrics: [
              { value: "9600↔115200", label: "Baud" },
              { value: "2", label: "CDC" },
              { value: "100 MHz", label: "PLL" }
            ],
            tags: [
              "FPGA", "Verilog", "UART",
              "Async FIFO", "CDC", "PLL",
              "Post-P&R Sim", "Board Test"
            ],
            status: "Verified on Board",
            statusColor: "text-green-600",
            delay: 350
          },
          {
            number: 3,
            title: "Digital IP Library",
            subtitle: "Reusable Verilog IP Cores for SoC / FPGA",
            metrics: [
              { value: "9+", label: "Cores" },
              { value: "100%", label: "TBs" },
              { value: "Reusable", label: "RTL" }
            ],
            tags: [
              "UART", "SPI", "I2C", "HDMI", "AXI-Lite",
              "FIFO", "Decoder", "Edge Detect", "Timers"
            ],
            status: "Design Complete",
            statusColor: "text-green-600",
            delay: 500
          },
          {
            number: 4,
            title: "8-bit Tree Adder",
            subtitle: "Full-Custom CMOS with Post-Layout Verification",
            metrics: [
              { value: "8-bit", label: "Width" },
              { value: "Tree", label: "Arch" },
              { value: "Clean", label: "DRC/LVS" }
            ],
            tags: [
              "Custom CMOS", "Virtuoso", "HSPICE",
              "Calibre DRC/LVS", "PEX", "PVT Sim"
            ],
            status: "Design Complete",
            statusColor: "text-green-600",
            delay: 650
          }
        ];

        return (
          <div className="min-h-screen bg-gray-50 p-8">
            <div className="max-w-4xl mx-auto">

              <div 
                className={`text-center mb-10 transition-all duration-700 ${
                  headerVisible ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-4'
                }`}
              >
                <div className="w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold shadow-lg mx-auto mb-4">
                  YN
                </div>
                <h1 className="text-3xl font-bold text-gray-900">[Your Name]</h1>
                <p className="text-gray-500 mt-2">B.S. Electrical Engineering</p>
                <p className="text-gray-400 text-sm mt-3 max-w-lg mx-auto">
                  Passionate about digital circuit design with hands-on experience in SRAM-based compute-in-memory,
                  FPGA development, and full-custom CMOS implementation.
                </p>
              </div>

              <h2 className={`text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4 transition-all duration-500 ${
                headerVisible ? 'opacity-100' : 'opacity-0'
              }`}>
                Independent Projects
              </h2>

              <div className="grid grid-cols-2 gap-5 mb-10">
                {projects.map((project, index) => (
                  <ProjectCard key={index} {...project} />
                ))}
              </div>

              <h2 className={`text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4 transition-all duration-500 ${
                skillsVisible ? 'opacity-100' : 'opacity-0'
              }`}>
                Technical Skills
              </h2>
              <div 
                className={`bg-white rounded-xl border border-gray-200 p-5 transition-all duration-500 ${
                  skillsVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'
                }`}
              >
                <div className="flex flex-wrap gap-2">
                  {[
                    "Verilog", "VHDL",
                    "Xilinx Vivado", "Cadence Virtuoso",
                    "HSPICE / Spectre", "Calibre",
                    "Python", "TCL", "Git"
                  ].map((skill, i) => (
                    <span 
                      key={i} 
                      className="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-200 transition-colors cursor-default"
                    >
                      {skill}
                    </span>
                  ))}
                </div>
              </div>

              <div className={`text-center text-xs text-gray-400 mt-8 transition-opacity duration-500 ${
                skillsVisible ? 'opacity-100' : 'opacity-0'
              }`}>
                ✨ Staggered pop-up animation on load
              </div>

            </div>
          </div>
        );
      };

      /* --- Render to DOM --- */
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<GitHubProfilePreview />);

    </script>
  </body>
</html>
